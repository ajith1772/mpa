<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EV Charging Portal</title>
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --bg: #f4f7f6;
            --card-bg: #ffffff;
            --text: #333333;
            --border: #e1e4e8;
            --box-accent: #1e3c72;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; }

        .header { width: auto; max-width: auto; margin-bottom: 20px; }
        .tabs { display: flex; background: var(--card-bg); border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .tab { flex: 1; padding: 15px; text-align: center; cursor: pointer; font-weight: bold; background: var(--card-bg); color: #888; transition: 0.3s; border-bottom: 3px solid transparent; }
        .tab.active { color: var(--secondary); border-bottom: 3px solid var(--secondary); background: #f8faff; }

        .card { background: var(--card-bg); width: 100%; max-width: 700px; padding: 30px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .box-heading {
            text-transform: uppercase;
            font-size: 1.5rem;
            font-weight: 900;
            color: var(--box-accent);
            background: linear-gradient(to right, #f8f9fa, #e9ecef);
            border: 2px solid var(--box-accent);
            border-left: 10px solid var(--secondary);
            padding: 15px 20px;
            border-radius: 8px;
            text-align: center;
            margin: 0 auto 25px auto;
            letter-spacing: 2px;
            box-shadow: 0 5px 10px rgba(0,0,0,0.1);
        }

        .vehicle-image-container {
            width: 100%;
            height: 250px;
            overflow: hidden;
            border-radius: 12px;
            margin-bottom: 25px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            background: #000;
        }
        .vehicle-image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.5s ease-in-out;
            opacity: 0.95;
        }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 700; font-size: 0.95rem; color: #444; }
        .form-control { width: 100%; padding: 14px 15px; border: 2px solid var(--border); border-radius: 8px; font-size: 1rem; transition: 0.3s; background: #fafbfc; }
        .form-control:focus { outline: none; border-color: var(--secondary); background: #fff; }
        .live-time { font-family: monospace; font-size: 1.2rem; color: var(--secondary); background: #eef2f5; font-weight: bold; border-color: transparent; }
        
        .btn { width: 100%; padding: 16px; border: none; border-radius: 8px; background: linear-gradient(to right, var(--secondary), var(--primary)); color: white; font-size: 1.2rem; font-weight: bold; cursor: pointer; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        .btn:hover { opacity: 0.9; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0, 210, 255, 0.4); }
        .btn:disabled { background: #ccc; cursor: not-allowed; transform: none; box-shadow: none; }

        .result-card { background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); color: white; border-radius: 16px; padding: 30px; text-align: center; margin-top: 40px; margin-bottom: 20px; display: none; box-shadow: 0 10px 25px rgba(42, 82, 152, 0.4); }
        .res-icon { font-size: 2.5rem; margin-bottom: 10px; }
        .res-vehicle { font-size: 1.5rem; font-weight: bold; letter-spacing: 2px; color: #a8cbf5; margin-bottom: 5px; }
        .res-label { color: #e1e4e8; text-transform: uppercase; font-size: 0.9rem; letter-spacing: 1px; margin-bottom: 10px;}
        .res-mileage { font-size: 5rem; font-weight: 900; color: #00d2ff; text-shadow: 0 0 20px rgba(0, 210, 255, 0.5); line-height: 1; margin-bottom: 20px; }
        .res-mileage span { font-size: 1.8rem; color: white; font-weight: normal; }
        .close-btn { background: rgba(255,255,255,0.2); border: none; color: white; padding: 10px 25px; border-radius: 20px; cursor: pointer; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        .close-btn:hover { background: rgba(255,255,255,0.4); }

        /* Tables */
        .history-section { margin-top: 30px; }
        .history-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .table-container { border: 2px solid var(--border); border-radius: 12px; overflow: hidden; background: #fff; }
        .table-header { background: var(--secondary); color: white; padding: 15px; text-align: center; font-weight: 900; font-size: 1.1rem; letter-spacing: 2px; }
        .table-scroll { max-height: 350px; overflow-y: auto; overflow-x: auto; } /* Added X scroll for mobile safety */
        
        .history-table { width: 100%; border-collapse: collapse; white-space: nowrap; }
        .history-table th { position: sticky; top: 0; background: #f8faff; color: #333; padding: 10px; text-align: center; border-bottom: 2px solid var(--border); font-size: 0.75rem; font-weight: 800; line-height: 1.4; }
        .history-table td { padding: 10px; border-bottom: 1px solid var(--border); font-size: 0.85rem; color: #444; text-align: center; vertical-align: middle; }
        
        .date-text { font-weight: bold; color: #2c3e50; font-size: 0.75rem; display: block; }
        .time-text { font-family: monospace; color: #e74c3c; font-size: 0.75rem; font-weight: bold; display: block; margin-top: 4px; }
        .mileage-text { font-size: 1.1rem; font-weight: 900; color: WATERvar(--secondary); }
        .odo-text { font-weight: bold; color: #555; }
        .user-text { font-weight: 900; color: #8e44ad; font-size: 0.85rem; background: #f3e5f5; padding: 4px 8px; border-radius: 4px; }

        .loader { text-align: center; color: #888; font-size: 1rem; padding: 20px; font-weight: bold; }
        .error-msg { display: none; background: #f8d7da; color: #721c24; padding: 15px; border-radius: 8px; margin-bottom: 20px; text-align: center; font-weight: bold; border: 2px solid #f5c6cb; }

        @media (max-width: 600px) { 
            .history-grid { grid-template-columns: 1fr; } 
            .res-mileage { font-size: 4rem; }
            .box-heading { font-size: 1.2rem; padding: 12px; }
            .vehicle-image-container { height: 180px; }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="tabs">
            <div class="tab active" onclick="switchTab('ev-charging')">⚡ EV CHARGING</div>
            <div class="tab" onclick="switchTab('other-tab')">WATER</div>
        </div>
    </div>

    <div class="card">
        <div id="ev-charging" class="tab-content active">
            
            <div id="errorBox" class="error-msg"></div>

            <div class="box-heading">CHARGE LOG ENTRY</div>
            
            <div class="vehicle-image-container">
                <img id="vehicleDisplayImg" src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgViN5AgBylzODrZHQjzY74tKkLed8f1WMcDdcBO_NmR3ndpA4YYw1KBJV18PSqHdsZDqW3Td3Mpsx0x0RHdxqqabLg4tukmxjgKKwB7u1PInj9stbtFdmSaNVvCvPM9zhJxfI4x3slJU03muh7wYTOqFG8ZVZWKJ-Z_DTB0aCyp5gvwr_lpEneDCkFh0zS/s320/DEFAULT.jpeg" alt="Select Vehicle">
            </div>

            <form id="evForm">
                <div class="form-group">
                    <label>DATE & TIME </label>
                    <input type="text" id="dateTimeDisplay" class="form-control live-time" readonly>
                </div>

                <div class="form-group">
                    <label>VEHICLE</label>
                    <select id="vehicle" class="form-control" required>
                        <option value="" disabled selected>Select your scooter...</option>
                        <option value="DESPRO">DESPRO</option>
                        <option value="LIBERTY+">LIBERTY+</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>CURRENT ODOMETER (KM)</label>
                    <input type="number" id="odometer" class="form-control" placeholder="e.g. 1520" step="0.1" required>
                </div>

                <!-- 🔥 NEW CHARGED BY DROPDOWN -->
                <div class="form-group">
                    <label>CHARGED BY</label>
                    <select id="chargedBy" class="form-control" required>
                        <option value="" disabled selected>Select user...</option>
                        <option value="RVK">RVK</option>
                        <option value="OVK">OVK</option>
                        <option value="ACHU">ACHU</option>
                        <option value="APPU">APPU</option>
                        <option value="SREE">SA</option>
                        <option value="SREE">SN</option>
                        <option value="VA">VA</option>
                    </select>
                </div>

                <button type="submit" id="submitBtn" class="btn">SAVE CHARGE LOG</button>
            </form>

            <div id="resultCard" class="result-card">
                <div class="res-icon">✅ SAVED</div>
                <div class="res-vehicle" id="resVehicle">VEHICLE</div>
                <div class="res-label">Mileage Since Last Charge</div>
                <div class="res-mileage" id="resMileage">0.0 <span>km</span></div>
                <button class="close-btn" onclick="document.getElementById('resultCard').style.display='none'">Awesome</button>
            </div>

            <div class="history-section">
                <div class="box-heading">CHARGING HISTORY</div>
                
                <div class="history-grid">
                    <!-- DESPRO -->
                    <div class="table-container">
                        <div class="table-header">DESPRO 02/5/2026 21:20:48 45KM</div>
                        <div class="table-scroll">
                            <table class="history-table" id="table-despro">
                                <thead>
                                    <tr>
                                        <th>DATE & TIME</th>
                                        <th>ODO</th>
                                        <th>MILEAGE</th>
                                        <th>BY</th>
                                    </tr>
                                </thead>
                                <tbody><tr><td colspan="4" class="loader">Loading Data...</td></tr></tbody>
                            </table>
                        </div>
                    </div>

                    <!-- LIBERTY+ -->
                    <div class="table-container">
                        <div class="table-header" style="background:#1e3c72;">LIBERTY+ 02/5/2026 21:20:48 141KM</div>
                        <div class="table-scroll">
                            <table class="history-table" id="table-liberty">
                                <thead>
                                    <tr>
                                        <th>DATE & TIME</th>
                                        <th>ODO</th>
                                        <th>MILEAGE</th>
                                        <th>BY</th>
                                    </tr>
                                </thead>
                                <tbody><tr><td colspan="4" class="loader">Loading Data...</td></tr></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="other-tab" class="tab-content">
            <div class="box-heading">WATER RECORDS</div>
            <p style="text-align:center; color:#777; font-weight:bold; margin-top:30px;">Coming soon...</p>
        </div>
    </div>

    <script>
        // 🚨🚨 REPLACE NEW URL HERE 🚨🚨
        const GOOGLE_APP_URL = "https://script.google.com/macros/s/AKfycbxUKZGTPuLpRSxv3AhrZnaYeGYm9GyMzzavGftn0lcKxYLEq4L9OIq-VE_0k37YFiSxrA/exec"; 

        function updateClock() {
            const d = new Date();
            const dd = String(d.getDate()).padStart(2, '0');
            const mm = String(d.getMonth() + 1).padStart(2, '0');
            const yyyy = d.getFullYear();
            
            const hours = String(d.getHours()).padStart(2, '0');
            const mins = String(d.getMinutes()).padStart(2, '0');
            const secs = String(d.getSeconds()).padStart(2, '0');

            document.getElementById('dateTimeDisplay').value = `${dd}/${mm}/${yyyy} ${hours}:${mins}:${secs}`;
        }
        setInterval(updateClock, 1000); updateClock();

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content, .tab').forEach(t => t.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.target.classList.add('active');
        }

        const vehicleImages = {
            "default": "https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgViN5AgBylzODrZHQjzY74tKkLed8f1WMcDdcBO_NmR3ndpA4YYw1KBJV18PSqHdsZDqW3Td3Mpsx0x0RHdxqqabLg4tukmxjgKKwB7u1PInj9stbtFdmSaNVvCvPM9zhJxfI4x3slJU03muh7wYTOqFG8ZVZWKJ-Z_DTB0aCyp5gvwr_lpEneDCkFh0zS/s320/DEFAULT.jpeg",
            "DESPRO": "https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgGeSFAbCWf1lu-i3mmnsPpEcxAfmRwigXd0YYFs2o0f2o7YM55ZMAzii1-HbydnNZ_bsiFGu-d4FE1koZHGZtAV3_7zF_sJ-a1dCEkfAGAxlfTKqzhF9fc6ewzAVaOkX0W7TTClg_Xyk6ZupDEfOQhxsBnZinVfKgdFmtNh3zjr06ut62Z5gw0JmiORJE1/s320/DESPRO.jpeg",
            "LIBERTY+": "https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgUPrBinRICH8Ls-edKvFvIZLmWz3B_FecgKs7sXZJmF9x1HfwxuaKjjq5IAIch66QJEW1qahJ7v0hAwBCe_9G5TQmGD-TIv5mj5VbDV36c3S2qjpqJTYPAwEozOXFvzyZfIpAO3ulWe19BR2-Gi8n-BFb_1uRjK7JtGe7OZWqCCgwz2pTC3yjB41QOHjke/s320/LIBERTY+.jpeg"
        };
        document.getElementById('vehicle').addEventListener('change', function(e) {
            const imgElement = document.getElementById('vehicleDisplayImg');
            imgElement.style.opacity = 0;
            setTimeout(() => { imgElement.src = vehicleImages[e.target.value]; imgElement.style.opacity = 1; }, 300);
        });

        function formatHistoryDate(dateStr) {
            if(!dateStr) return "";
            if (dateStr.includes(" ")) {
                let parts = dateStr.split(" ");
                if(parts.length >= 2) {
                    return `<span class="date-text">${parts[0]}</span><span class="time-text">${parts[1]}</span>`;
                }
            }
            return dateStr;
        }

        function renderHistory(data) {
            const tBodyDespro = document.querySelector('#table-despro tbody');
            const tBodyLiberty = document.querySelector('#table-liberty tbody');
            tBodyDespro.innerHTML = ''; tBodyLiberty.innerHTML = '';
            let countD = 0, countL = 0;

            data.forEach(row => {
                // 🔥 NEW: Includes the Charged By column in the table layout
                let htmlStr = `<tr>
                    <td>${formatHistoryDate(row.date)}</td>
                    <td><span class="odo-text">${row.odometer}</span></td>
                    <td><span class="mileage-text">${row.mileage}</span></td>
                    <td><span class="user-text">${row.chargedBy}</span></td>
                </tr>`;
                
                if (row.vehicle === 'DESPRO') { tBodyDespro.innerHTML += htmlStr; countD++; }
                if (row.vehicle === 'LIBERTY+') { tBodyLiberty.innerHTML += htmlStr; countL++; }
            });

            if (countD === 0) tBodyDespro.innerHTML = `<tr><td colspan="4" class="loader">No Records Yet</td></tr>`;
            if (countL === 0) tBodyLiberty.innerHTML = `<tr><td colspan="4" class="loader">No Records Yet</td></tr>`;
        }

        window.addEventListener('DOMContentLoaded', async () => {
            try {
                const res = await fetch(GOOGLE_APP_URL);
                const json = await res.json();
                if (json.status === "Success") renderHistory(json.history);
            } catch (err) { 
                console.error("Initial load failed.", err); 
            }
        });

        document.getElementById('evForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const errBox = document.getElementById('errorBox');
            const resultCard = document.getElementById('resultCard');
            
            btn.disabled = true; 
            btn.innerText = "SAVING DATA...";
            errBox.style.display = 'none';
            resultCard.style.display = 'none';

            const payload = {
                vehicle: document.getElementById('vehicle').value,
                odometer: document.getElementById('odometer').value,
                chargedBy: document.getElementById('chargedBy').value // 🔥 Added payload field
            };

            try {
                const response = await fetch(GOOGLE_APP_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify(payload),
                    redirect: 'follow'
                });
                
                const result = await response.json();

                if(result.status === "Success") {
                    document.getElementById('resVehicle').innerText = result.vehicle;
                    document.getElementById('resMileage').innerHTML = `${result.mileage} <span>km</span>`;
                    resultCard.style.display = 'block';
                    
                    document.getElementById('evForm').reset();
                    document.getElementById('vehicleDisplayImg').src = vehicleImages["default"];
                    renderHistory(result.history);
                } else {
                    throw new Error(result.message || "Unknown error occurred.");
                }
            } catch (error) {
                errBox.style.display = 'block';
                errBox.innerText = "Error saving data. Please check Web App URL. Error: " + error.message;
            } finally {
                btn.disabled = false;
                btn.innerText = "SAVE CHARGE LOG";
            }
        });
    </script>
</body>
</html>
